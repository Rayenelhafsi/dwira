<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Dwira Agence Immobiliere</title>
  <desc id="desc">Circular green and gold Dwira real estate logo</desc>
  <defs>
    <linearGradient id="dwiraBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c3a"/>
      <stop offset="100%" stop-color="#0a2e23"/>
    </linearGradient>
    <linearGradient id="dwiraGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b15d"/>
      <stop offset="100%" stop-color="#9f7426"/>
    </linearGradient>
    <filter id="dwiraShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#041711" flood-opacity="0.35"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="246" fill="url(#dwiraBg)"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="url(#dwiraGold)" stroke-width="10"/>

  <g transform="translate(74 122)" filter="url(#dwiraShadow)">
    <circle cx="32" cy="140" r="26" fill="none" stroke="url(#dwiraGold)" stroke-width="10"/>
    <path d="M58 134 L136 46" fill="none" stroke="url(#dwiraGold)" stroke-width="10" stroke-linecap="round"/>
    <path d="M118 64 L150 34 L244 34 L244 180 L88 180" fill="none" stroke="url(#dwiraGold)" stroke-width="10" stroke-linejoin="round"/>
    <path d="M114 72 h28 a10 10 0 0 1 0 20 h-20" fill="none" stroke="url(#dwiraGold)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M102 100 h34 a10 10 0 0 1 0 20 h-24" fill="none" stroke="url(#dwiraGold)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g fill="#f8f6f1">
    <text x="276" y="240" font-family="Georgia, Times New Roman, serif" font-size="72" letter-spacing="2">DWIRA</text>
    <text x="256" y="303" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="8">AGENCE IMMOBILIERE</text>
    <text x="256" y="356" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="6">TROUVEZ VOTRE LIEU DE VIE</text>
  </g>

  <line x1="110" y1="278" x2="176" y2="278" stroke="url(#dwiraGold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="334" y1="278" x2="402" y2="278" stroke="url(#dwiraGold)" stroke-width="3" stroke-linecap="round"/>
  <line x1="206" y1="378" x2="306" y2="378" stroke="url(#dwiraGold)" stroke-width="3" stroke-linecap="round"/>
</svg>
