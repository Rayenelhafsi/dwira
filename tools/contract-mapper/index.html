<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contract Mapper (Calibre)</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f3f4f6}
    .wrap{display:grid;grid-template-columns:400px 1fr;min-height:100vh}
    .left{background:#fff;border-right:1px solid #e5e7eb;padding:12px;overflow:auto}
    .right{padding:12px;overflow:auto}
    input,button{width:100%;margin:6px 0;padding:8px;border:1px solid #d1d5db;border-radius:8px}
    button{cursor:pointer}
    .row{display:flex;gap:6px}
    .row > *{flex:1}
    .canvasWrap{position:relative;display:inline-block;border:1px solid #ddd;background:#fff}
    #overlay{position:absolute;inset:0}
    .dot{position:absolute;transform:translate(-50%,-50%);background:#059669;color:#fff;font-size:10px;padding:2px 6px;border-radius:999px}
    .real{position:absolute;transform:translateY(-100%);color:#111827;font-family:Arial,Helvetica,sans-serif;font-size:11px;line-height:1.15;font-weight:400;white-space:nowrap}
    .cal{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px;margin:8px 0}
    .vars{max-height:240px;overflow:auto;border:1px solid #e5e7eb;border-radius:8px;margin:8px 0}
    .v{padding:6px 8px;border-bottom:1px solid #f3f4f6;cursor:pointer;font-size:12px}
    .v.active{background:#ecfeff}
    pre{background:#111827;color:#e5e7eb;padding:8px;border-radius:8px;max-height:250px;overflow:auto}
  </style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <h3>Contract Mapper</h3>
    <button id="loadDefault">Charger template</button>

    <div class="cal">
      <b>Calibration (fiable)</b>
      <div style="font-size:12px;color:#374151">Renseigne 2 points de reference (base -> reel), puis applique.</div>
      <input id="b1" placeholder="Base P1: x,y (ex: 100,200)" value="100,200" />
      <input id="r1" placeholder="Reel P1: x,y" />
      <input id="b2" placeholder="Base P2: x,y (ex: 500,700)" value="500,700" />
      <input id="r2" placeholder="Reel P2: x,y" />
      <button id="applyCal">Appliquer calibration</button>
      <div id="calInfo" style="font-size:12px;color:#1e3a8a"></div>
    </div>

    <div class="vars" id="varList"></div>
    <input id="varName" placeholder="nom variable" />
    <button id="selectVar">Selectionner variable</button>
    <input id="pageInput" type="number" value="1" min="1" />
    <button id="prev">Page -</button>
    <button id="next">Page +</button>
    <div class="cal">
      <b>Edition facile</b>
      <div class="row">
        <input id="step" type="number" value="1" min="0.1" step="0.1" />
        <button id="dragToggle">Drag OFF</button>
      </div>
      <div class="row">
        <button id="leftBtn">←</button><button id="upBtn">↑</button><button id="downBtn">↓</button><button id="rightBtn">→</button>
      </div>
      <div style="font-size:12px;color:#4b5563">Flèches clavier: déplacer variable sélectionnée. Shift = x10.</div>
    </div>
    <button id="copy">Copier JSON final</button>
    <button id="toggleView">Afficher textes reels</button>
    <pre id="out"></pre>
  </div>
  <div class="right">
    <div class="canvasWrap"><canvas id="c"></canvas><div id="overlay"></div></div>
  </div>
</div>
<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/+esm';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/build/pdf.worker.min.mjs';
const base={
  fullName:{page:1,x:329.9,top:274.9,fontSize:11,maxWidth:360},identityRef:{page:1,x:341.9,top:294,fontSize:11,maxWidth:330},userAddress:{page:1,x:345.9,top:312.9,fontSize:11,maxWidth:455},userPhone:{page:1,x:346.9,top:338.9,fontSize:11,maxWidth:220},
  typeLogement:{page:1,x:199.9,top:439.3,fontSize:11,maxWidth:180},adresseBien:{page:1,x:240.9,top:455.9,fontSize:11,maxWidth:220},capacite:{page:1,x:221.9,top:472.9,fontSize:11,maxWidth:80},adultes:{page:1,x:329.9,top:471.9,fontSize:11,maxWidth:80},enfants:{page:1,x:417.9,top:471.9,fontSize:11,maxWidth:80},
  equipementsBien:{page:1,x:132.9,top:506.9,fontSize:11,maxWidth:420},jj1:{page:1,x:75.9,top:555.9,fontSize:11,maxWidth:28},mm1:{page:1,x:107.9,top:555.9,fontSize:11,maxWidth:28},jj2:{page:1,x:184.9,top:554.9,fontSize:11,maxWidth:28},mm2:{page:1,x:214.9,top:555.9,fontSize:11,maxWidth:28},
  heureArrivee:{page:1,x:168.9,top:570.9,fontSize:11,maxWidth:120},heureDepart:{page:1,x:169.9,top:587.9,fontSize:11,maxWidth:120},loyerTotal:{page:2,x:360.9,top:70.9,fontSize:11,maxWidth:180},acompteReservation:{page:2,x:382.9,top:97.9,fontSize:11,maxWidth:180},jjp:{page:2,x:319.9,top:113.9,fontSize:11,maxWidth:28},mmp:{page:2,x:367.9,top:114.9,fontSize:11,maxWidth:28},hhp:{page:2,x:450.9,top:113.9,fontSize:11,maxWidth:28},minp:{page:2,x:503.9,top:113.9,fontSize:11,maxWidth:28},idPaiement:{page:2,x:353.9,top:134.9,fontSize:11,maxWidth:230},soldeArrivee:{page:2,x:364.9,top:157.9,fontSize:11,maxWidth:180},modePaiement:{page:2,x:473.9,top:190.9,fontSize:11,maxWidth:200},caution:{page:2,x:193.9,top:453.9,fontSize:11,maxWidth:220},VS:{page:3,x:146.9,top:191.9,fontSize:11,maxWidth:110},JJs:{page:3,x:297.9,top:189.9,fontSize:11,maxWidth:28},MMS:{page:3,x:343.9,top:189.9,fontSize:11,maxWidth:28}
};
const previewText={
  fullName:'Rayen Elhafsi',identityRef:'CIN 14449155',userAddress:'Kelibia Nabeul',userPhone:'+21624879087',
  typeLogement:'Ref REF-289, Villa S+3',adresseBien:'Kelibia, Nabeul',capacite:'4',adultes:'2 adulte(s)',enfants:'0 enfant(s)',
  equipementsBien:'TV, machine a laver, climatisation',jj1:'12',mm1:'06',jj2:'19',mm2:'06',heureArrivee:'14:00',heureDepart:'11:00',
  loyerTotal:'7 025,00 TND',acompteReservation:'3 513,00 TND',jjp:'31',mmp:'05',hhp:'19',minp:'16',idPaiement:'PAY-REF289',
  soldeArrivee:'3 512,00 TND',modePaiement:'Virement',caution:'1 000,00',VS:'Kelibia',JJs:'28',MMS:'05'
};
const st={pdf:null,page:1,scale:1,var:Object.keys(base)[0],base:{...base},t:{sx:1,sy:1,dx:0,dy:0},realView:false,drag:false,dragging:false};
const c=document.getElementById('c'),ctx=c.getContext('2d'),ov=document.getElementById('overlay'),out=document.getElementById('out'),varList=document.getElementById('varList');
const calInfo=document.getElementById('calInfo');
function p(v){const [x,y]=String(v||'').split(',').map(n=>Number(n.trim()));return {x,y};}
function tf(x,y){return {x: +(x*st.t.sx+st.t.dx).toFixed(1), y:+(y*st.t.sy+st.t.dy).toFixed(1)};}
function renderOut(){const fin={};for(const [k,v] of Object.entries(st.base)){const z=tf(v.x,v.top);fin[k]={page:v.page,x:z.x,top:z.y,fontSize:v.fontSize,maxWidth:v.maxWidth};}out.textContent=JSON.stringify(fin,null,2)}
function renderList(){varList.innerHTML='';Object.keys(st.base).forEach(k=>{const d=document.createElement('div');d.className='v'+(st.var===k?' active':'');d.textContent=k;d.onclick=()=>{st.var=k;document.getElementById('varName').value=k;renderList();};varList.appendChild(d);});}
async function render(){if(!st.pdf)return;const p=await st.pdf.getPage(st.page);const v=p.getViewport({scale:st.scale});c.width=v.width;c.height=v.height;ov.style.width=v.width+'px';ov.style.height=v.height+'px';await p.render({canvasContext:ctx,viewport:v}).promise;drawDots();renderOut();renderList();}
function drawDots(){
  ov.innerHTML='';
  Object.entries(st.base).forEach(([k,f])=>{
    if((f.page||1)!==st.page)return;
    const t=tf(f.x,f.top);
    const d=document.createElement('div');
    if(st.realView){
      d.className='real';
      d.textContent=previewText[k] || k;
      d.style.left=(t.x*st.scale)+'px';
      d.style.top=(t.y*st.scale)+'px';
      d.style.fontSize=Math.max(9, (f.fontSize||11)*st.scale)+'px';
      d.style.maxWidth=((f.maxWidth||220)*st.scale)+'px';
    }else{
      d.className='dot';
      d.textContent=k;
      d.style.left=(t.x*st.scale)+'px';
      d.style.top=(t.y*st.scale)+'px';
    }
    d.dataset.key = k;
    d.style.cursor = st.drag ? 'move' : 'pointer';
    ov.appendChild(d);
  });
}
ov.addEventListener('click',(e)=>{
  if(!st.pdf || st.dragging) return;
  const key = e.target?.dataset?.key;
  if (key) {
    st.var = key;
    document.getElementById('varName').value = key;
    renderList();
    return;
  }
  const r=ov.getBoundingClientRect();const rx=(e.clientX-r.left)/st.scale, ry=(e.clientY-r.top)/st.scale;const k=st.var;const bx=(rx-st.t.dx)/st.t.sx, by=(ry-st.t.dy)/st.t.sy;st.base[k]={...(st.base[k]||{page:st.page,fontSize:11,maxWidth:220}),page:st.page,x:+bx.toFixed(1),top:+by.toFixed(1)};drawDots();renderOut();renderList();
});
ov.addEventListener('mousedown',(e)=>{
  if(!st.drag) return;
  const key = e.target?.dataset?.key;
  if(!key) return;
  st.var = key;
  st.dragging = true;
  const startX = e.clientX, startY = e.clientY;
  const start = { ...st.base[key] };
  const onMove = (ev) => {
    const dx = (ev.clientX - startX) / st.scale;
    const dy = (ev.clientY - startY) / st.scale;
    st.base[key] = { ...start, x: +(start.x + dx).toFixed(1), top: +(start.top + dy).toFixed(1) };
    drawDots(); renderOut(); renderList();
  };
  const onUp = () => {
    st.dragging = false;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});
function nudge(dx,dy,mult=1){
  const key=st.var; if(!key||!st.base[key]) return;
  const step=Math.max(0.1, Number(document.getElementById('step').value||1))*mult;
  st.base[key]={...st.base[key],x:+(st.base[key].x+dx*step).toFixed(1),top:+(st.base[key].top+dy*step).toFixed(1)};
  drawDots(); renderOut(); renderList();
}
document.getElementById('applyCal').onclick=()=>{const B1=p(document.getElementById('b1').value),R1=p(document.getElementById('r1').value),B2=p(document.getElementById('b2').value),R2=p(document.getElementById('r2').value);if([B1.x,B1.y,R1.x,R1.y,B2.x,B2.y,R2.x,R2.y].some(Number.isNaN)){alert('Coordonnees invalides');return;}const sx=(R2.x-R1.x)/(B2.x-B1.x||1), sy=(R2.y-R1.y)/(B2.y-B1.y||1);const dx=R1.x-B1.x*sx, dy=R1.y-B1.y*sy;st.t={sx,sy,dx,dy};calInfo.textContent=`sx=${sx.toFixed(4)} sy=${sy.toFixed(4)} dx=${dx.toFixed(2)} dy=${dy.toFixed(2)}`;render();};
document.getElementById('selectVar').onclick=()=>{const v=(document.getElementById('varName').value||'').trim();if(!v)return;st.var=v;st.base[v]=st.base[v]||{page:st.page,x:50,top:50,fontSize:11,maxWidth:220};renderList();renderOut();};
document.getElementById('prev').onclick=()=>{st.page=Math.max(1,st.page-1);document.getElementById('pageInput').value=st.page;render();};
document.getElementById('next').onclick=()=>{if(!st.pdf)return;st.page=Math.min(st.pdf.numPages,st.page+1);document.getElementById('pageInput').value=st.page;render();};
document.getElementById('pageInput').onchange=(e)=>{st.page=Math.max(1,Number(e.target.value||1));render();};
document.getElementById('copy').onclick=async()=>{renderOut();await navigator.clipboard.writeText(out.textContent);};
document.getElementById('leftBtn').onclick=()=>nudge(-1,0);
document.getElementById('rightBtn').onclick=()=>nudge(1,0);
document.getElementById('upBtn').onclick=()=>nudge(0,-1);
document.getElementById('downBtn').onclick=()=>nudge(0,1);
document.getElementById('dragToggle').onclick=()=>{
  st.drag=!st.drag;
  document.getElementById('dragToggle').textContent=st.drag?'Drag ON':'Drag OFF';
  drawDots();
};
window.addEventListener('keydown',(e)=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  const mult=e.shiftKey?10:1;
  if(e.key==='ArrowLeft'){e.preventDefault();nudge(-1,0,mult);}
  if(e.key==='ArrowRight'){e.preventDefault();nudge(1,0,mult);}
  if(e.key==='ArrowUp'){e.preventDefault();nudge(0,-1,mult);}
  if(e.key==='ArrowDown'){e.preventDefault();nudge(0,1,mult);}
});
document.getElementById('toggleView').onclick=()=>{
  st.realView=!st.realView;
  document.getElementById('toggleView').textContent=st.realView?'Afficher variables':'Afficher textes reels';
  drawDots();
};
document.getElementById('loadDefault').onclick=async()=>{const res=await fetch('/server/assets/contrat_template.pdf');const bytes=new Uint8Array(await res.arrayBuffer());st.pdf=await pdfjsLib.getDocument({data:bytes}).promise;st.page=1;document.getElementById('pageInput').value=1;render();};
renderOut();renderList();
</script>
</body>
</html>
