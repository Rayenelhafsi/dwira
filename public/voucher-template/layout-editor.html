<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Voucher Layout Editor</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { display: grid; grid-template-columns: 1fr 360px; min-height: 100vh; }
    .stage { padding: 16px; overflow: auto; }
    .canvas { position: relative; width: 1536px; height: 1024px; background: url('./vide.jpg') no-repeat center/cover; border: 2px solid #334155; }
    .node {
      position: absolute; cursor: move; user-select: none;
      background: rgba(255,255,255,0.75); color: #0f172a; border: 1px solid #0ea5e9;
      border-radius: 6px; padding: 4px 8px; font-weight: 700; font-size: 20px;
    }
    .node.qr { background: rgba(14,165,233,0.15); border-style: dashed; }
    .side { border-left: 1px solid #334155; padding: 16px; background: #111827; }
    .side h2 { margin: 0 0 8px; font-size: 18px; }
    .side p { margin: 0 0 12px; font-size: 13px; color: #93c5fd; }
    textarea { width: 100%; height: 440px; background: #020617; color: #93c5fd; border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 12px; }
    button { margin-top: 8px; width: 100%; border: 0; border-radius: 8px; padding: 10px; font-weight: 700; cursor: pointer; }
    .btn1 { background: #059669; color: #fff; }
    .btn2 { background: #2563eb; color: #fff; }
    .btn3 { background: #ef4444; color: #fff; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hint { margin-top: 10px; font-size: 12px; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <div id="canvas" class="canvas"></div>
    </div>
    <aside class="side">
      <h2>Voucher Position Editor</h2>
      <p>Glisse les champs. Ensuite copie JSON et envoie-moi.</p>
      <div class="row">
        <button class="btn1" id="copyBtn">Copier JSON</button>
        <button class="btn2" id="downloadBtn">Télécharger JSON</button>
      </div>
      <button class="btn3" id="resetBtn">Reset défaut</button>
      <textarea id="jsonOut"></textarea>
      <div class="hint">
        URL: <code>/voucher-template/layout-editor.html</code><br/>
        Champs: logo, nom, telephone, reference, date_debut_jour, date_debut_mois, date_fin_jour, date_fin_mois, personnes, qr, id
      </div>
    </aside>
  </div>

  <script>
    const defaults = {
      logo: { x: 70, y: 120, w: 200, h: 200, size: 20, text: "LOGO" },
      nom: { x: 612, y: 431, w: 420, h: 36, size: 24, text: "Nom prénom" },
      telephone: { x: 576, y: 515, w: 430, h: 36, size: 24, text: "24879087" },
      reference: { x: 628, y: 599, w: 390, h: 36, size: 24, text: "REF-247" },
      date_debut_jour: { x: 658, y: 687, w: 48, h: 30, size: 20, text: "26" },
      date_debut_mois: { x: 730, y: 687, w: 48, h: 30, size: 20, text: "05" },
      date_fin_jour: { x: 866, y: 687, w: 48, h: 30, size: 20, text: "30" },
      date_fin_mois: { x: 938, y: 687, w: 48, h: 30, size: 20, text: "05" },
      personnes: { x: 648, y: 774, w: 390, h: 36, size: 20, text: "1 (Adultes:1, Enfants:0)" },
      qr: { x: 443, y: 806, w: 132, h: 132, size: 16, text: "QR" },
      id: { x: 640, y: 907, w: 385, h: 34, size: 22, text: "rd_177..." }
    };

    const STORAGE_KEY = "dwira_voucher_layout";
    const canvas = document.getElementById("canvas");
    const jsonOut = document.getElementById("jsonOut");
    let layout = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || JSON.parse(JSON.stringify(defaults));

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
      jsonOut.value = JSON.stringify(layout, null, 2);
    }

    function mkNode(key, cfg) {
      const el = document.createElement("div");
      el.className = "node" + (key === "qr" ? " qr" : "");
      el.dataset.key = key;
      el.textContent = cfg.text || key;
      el.style.left = cfg.x + "px";
      el.style.top = cfg.y + "px";
      el.style.width = cfg.w + "px";
      el.style.height = cfg.h + "px";
      el.style.fontSize = (cfg.size || 20) + "px";
      el.style.display = "flex";
      el.style.alignItems = "center";
      el.style.justifyContent = "center";
      let sx = 0, sy = 0, ox = 0, oy = 0, dragging = false;
      el.addEventListener("mousedown", (e) => {
        dragging = true;
        sx = e.clientX; sy = e.clientY;
        ox = layout[key].x; oy = layout[key].y;
      });
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        layout[key].x = Math.max(0, Math.round(ox + (e.clientX - sx)));
        layout[key].y = Math.max(0, Math.round(oy + (e.clientY - sy)));
        el.style.left = layout[key].x + "px";
        el.style.top = layout[key].y + "px";
        save();
      });
      window.addEventListener("mouseup", () => dragging = false);
      return el;
    }

    function render() {
      canvas.innerHTML = "";
      Object.entries(layout).forEach(([k, v]) => canvas.appendChild(mkNode(k, v)));
      save();
    }

    document.getElementById("copyBtn").onclick = async () => {
      await navigator.clipboard.writeText(JSON.stringify(layout, null, 2));
      alert("JSON copié.");
    };
    document.getElementById("downloadBtn").onclick = () => {
      const blob = new Blob([JSON.stringify(layout, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "voucher-layout.json";
      a.click();
      URL.revokeObjectURL(a.href);
    };
    document.getElementById("resetBtn").onclick = () => {
      layout = JSON.parse(JSON.stringify(defaults));
      render();
    };

    render();
  </script>
</body>
</html>
